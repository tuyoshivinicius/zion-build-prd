name: check-assets
on:
  push:
  pull_request:
jobs:
  check-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verifica drift de assets derivados
        run: ./scripts/check-assets.sh
      - name: Avaliação da camada mecânica
        run: ./scripts/eval.sh
